            <h1 class="page-title">Certifications</h1>

        <div class="certificate-gallery reveal-hidden">
            
            <div id="display-box" class="cert-display">
                <!-- Cert 1 defaults to .jpg -->
                <img id="main-cert-image" src="Certificate 1.jpg" alt="Active Certification">
            </div>
            
            <p id="cert-description" class="cert-description">Code to Connect: Programming Languages and Databases 101</p>

            <div class="cert-thumbnails">
                <div class="cert-thumb active" onclick="showCertificate('Certificate 1.jpg', 'Code to Connect: Programming Languages and Databases 101', this)">
                    <img src="Certificate 1.jpg" alt="Cert 1">
                </div>
                <div class="cert-thumb" onclick="showCertificate('Certificate 2.png', 'Low-Level Control: Programming Arduino Using Assembly Language', this)">
                    <!-- Cert 2 set to .png -->
                    <img src="Certificate 2.png" alt="Cert 2">
                </div>
                <div class="cert-thumb" onclick="showCertificate('Certificate 3.png', 'COMPFEST 2026: Connecting Minds to Power Sustainable Innovation', this)">
                    <!-- Cert 3 set to .png -->
                    <img src="Certificate 3.png" alt="Cert 3">
                </div>
                <div class="cert-thumb" onclick="showCertificate('Certificate 4.png', 'ROBOSEUM: Creating the Future One Robot at a Time', this)">
                    <!-- Cert 4 set to .png -->
                    <img src="Certificate 4.png" alt="Cert 4">
                </div>
            </div>
